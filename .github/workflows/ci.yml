name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  native:
    name: Native (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false   # we'll cache + lazily fetch the LFS tarball below
      - name: Cache SingleStepTests corpus (LFS)
        id: lfs-cache
        uses: actions/cache@v4
        with:
          path: crates/nies-core/tests/data/65x02.tar.zst
          # Hash the LFS pointer (which contains the SHA-256 of the real
          # tarball). Cache invalidates whenever the corpus changes.
          key: lfs-corpus-${{ hashFiles('crates/nies-core/tests/data/65x02.tar.zst') }}
      - name: Pull LFS objects on cache miss
        if: steps.lfs-cache.outputs.cache-hit != 'true'
        run: git lfs pull --include="crates/nies-core/tests/data/65x02.tar.zst"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - run: cargo build --workspace --exclude nies-web
      - run: cargo test --workspace --exclude nies-web
      - run: cargo clippy --workspace --exclude nies-web --all-targets -- -D warnings

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked
      - name: Install trunk
        run: cargo install trunk --version 0.21.14 --locked
      - name: WASM determinism test (headless Chrome)
        run: wasm-pack test --headless --chrome crates/nies-web
      - run: cargo build --target wasm32-unknown-unknown -p nies-web
      - run: trunk build --release
      - name: WASM size report
        run: |
          echo "### WASM bundle size" >> "$GITHUB_STEP_SUMMARY"
          ls -lh dist/*.wasm | tee -a "$GITHUB_STEP_SUMMARY"
          gzip -c dist/*.wasm | wc -c | awk '{print "gzipped bytes: " $1}' | tee -a "$GITHUB_STEP_SUMMARY"
